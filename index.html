<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analizador Léxico</title>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Analizador Léxico</h1>
  </header>

  <div class="layout">

    <div class="left-col">
      <!-- Panel izquierdo: editor -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Editor de código</span>
          <div class="dot-row">
            <div class="dot r"></div>
            <div class="dot y"></div>
            <div class="dot g"></div>
          </div>
        </div>
        <textarea id="src" placeholder="// Escribe o pega tu código aquí...
  int x = 10;
  if (x > 5) {
      return x;
  }"></textarea>
        <div class="btn-row">
          <button class="btn-primary" onclick="analizar()"> Analizar</button>
          <button class="btn-secondary" onclick="limpiar()"> Limpiar</button>
        </div>
      </div>
    </div>

    <div class="right-col">
      <!-- Resumen -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Resumen</span>
        </div>
        <div class="stats-grid" id="stats-grid"></div>
      </div>

      <!-- Tabla de tokens -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Tabla de tokens</span>
          <label
            style="display:flex;align-items:center;gap:6px;font-size:.65rem;color:var(--muted);font-family:var(--mono);cursor:pointer;">
            <input type="checkbox" id="show-ws" onchange="analizar()" style="accent-color:var(--accent);">
            Mostrar espacios
          </label>
        </div>
        <div class="token-table-wrap" id="table-wrap">
          <div class="placeholder">
            <span class="placeholder-icon">{ }</span>
            <span>Ingresa código y presiona Analizar</span>
          </div>
        </div>
        <div class="legend" id="legend"></div>
      </div>
    </div>

    <!-- Árbol sintáctico - abajo de todo -->
    <div class="panel tree-panel-full">
      <div class="panel-header">
        <span class="panel-title">Árbol Sintáctico</span>
      </div>
      <div class="tree-wrap" id="tree-wrap">
        <div class="tree-placeholder" id="tree-placeholder">
          <img src="nodos.png" alt="Árbol sintáctico">
          <span>El árbol sintáctico aparecerá aquí</span>
        </div>
      </div>
      </div>
    </div>

  </div>

<script src="analizador_lexico.js"></script>
<!--<script src="arbol_sintactico.js"></script>-->

</body>

</html>
